<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>생산라인 모니터링 시스템</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img
            class="brand-icon"
            src="/images/header_logo.png"
            alt=""
            decoding="async"
          />
          <span class="brand-title">생산라인 모니터링 시스템</span>
          <div class="phase-toggle" role="tablist" aria-label="공정 선택">
            <button type="button" class="phase-btn phase-btn--active" id="phaseSmt" data-phase="smt" role="tab" aria-selected="true">
              SMT
            </button>
            <button type="button" class="phase-btn" id="phaseAssy" data-phase="assy" role="tab" aria-selected="false">
              ASSY
            </button>
          </div>
        </div>
        <div class="topbar-meta">
          <span id="connPill" class="pill pill--live">
            <span class="dot dot--green"></span>
            실시간 연동
          </span>
          <span id="clockLabel" class="clock">–</span>
        </div>
      </div>
    </header>

    <main class="page">
      <div id="alertBar" class="alert hidden"></div>

      <div id="lineList" class="line-list" aria-live="polite"></div>

      <div
        id="hiddenLinesBar"
        class="hidden-lines-bar hidden"
        aria-label="숨긴 라인"
      ></div>

      <p id="emptyState" class="empty hidden"></p>

      <section id="envPanel" class="env-panel" aria-label="SMT 생산실 온습도">
        <div class="env-panel__head">
          <h2 class="env-panel__title">SMT 생산실 온·습도</h2>
          <div class="env-panel__meta">
            <span id="envStatus" class="env-panel__status env-panel__status--warn">연결 중…</span>
            <span id="envUpdated" class="env-panel__updated">—</span>
          </div>
        </div>
        <div class="env-panel__gauges">
          <div class="env-gauge env-gauge--temp">
            <div class="env-gauge__label">온도</div>
            <div id="envTempVal" class="env-gauge__value">—</div>
          </div>
          <div class="env-gauge env-gauge--hum">
            <div class="env-gauge__label">습도</div>
            <div id="envHumVal" class="env-gauge__value">—</div>
          </div>
        </div>
        <div class="env-panel__chart-wrap">
          <canvas id="envChart" aria-label="24시간 온습도 차트"></canvas>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <script src="/app.js" defer></script>
    <script src="/env.js" defer></script>
  </body>
</html>
